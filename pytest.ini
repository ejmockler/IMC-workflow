[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# The 2026-07-12 tracked, non-integration suite measures 41.62%. Keep an active
# 40% non-regression floor; 80% remains a future coverage target, not a claim.
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --color=yes
    --durations=10
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=40
    --maxfail=1
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    batch_correction: marks batch correction related tests
    validation: marks validation framework tests
    performance: marks performance benchmark tests
    security: marks security-related tests
    benchmark: marks benchmark-style performance tests
    narrative: marks narrative/biological interpretation tests
