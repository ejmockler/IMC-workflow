    <figcaption>Neutrophil-typed CD44⁺ activation across Sham→D1→D3→D7. Switch <em>region</em> (cortex / medulla / pooled) and the trajectory, per-mouse points, Sham-mean baseline and the headline number morph in place. Neutrophil requires cell-type gating, which exists only at 10µm — so this figure has a region lens, not a scale lens. Per-mouse points (n=2), no error bars; dot area ∝ √n_support.
    <span class="source">Source: results/biological_analysis/collab_cd44/cd44_compartment_rates_10um.csv (neutrophil × region × timepoint × mouse). Descriptive; n=2 mice.</span></figcaption>

</figure>
<script>
(function(){
var F2 = {"tps":["Sham","D1","D3","D7"],"regions":{"cortex":{"mean":[0.3495,0.4219,0.7576,0.9853],"mice":{"Sham":[[0.3435,246],[0.3556,135]],"D1":[[0.2504,295],[0.5934,91]],"D3":[[0.8901,91],[0.625,324]],"D7":[[0.9706,329],[1.0,201]]}},"medulla":{"mean":[0.324,0.3989,0.7295,0.6333],"mice":{"Sham":[[0.4286,91],[0.2194,230]],"D1":[[0.2957,115],[0.5021,226]],"D3":[[0.5758,330],[0.8833,120]],"D7":[[0.61,200],[0.6565,276]]}},"pooled":{"mean":[0.3183,0.399,0.6958,0.8107],"mice":{"Sham":[[0.3719,337],[0.2648,365]],"D1":[[0.2655,410],[0.5326,317]],"D3":[[0.6805,421],[0.7111,444]],"D7":[[0.8504,529],[0.771,477]]}}}};
var fig = document.getElementById("fig-2");
if(!fig) return;
var XT=[248.8,466.2,683.8,901.2], TPS=["Sham","D1","D3","D7"];
function y(r){return 440-360*r;}
function rad(n){return Math.max(2,Math.min(6.5,1.5+1.8*Math.sqrt(n/300)));}
function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
var cur = F2.regions[fig.getAttribute("data-region")].mean.slice();
function draw(mean,region){
  document.getElementById("n-line").setAttribute("points",mean.map(function(v,i){return XT[i]+","+y(v).toFixed(1);}).join(" "));
  document.getElementById("n-baseline").setAttribute("y1",y(mean[0]).toFixed(1));
  document.getElementById("n-baseline").setAttribute("y2",y(mean[0]).toFixed(1));
  document.getElementById("n-baseline-lab").setAttribute("y",y(mean[0]).toFixed(1));
  var reg=F2.regions[region];
  for(var i=0;i<4;i++){
    document.getElementById("n-dot-"+i).setAttribute("cy",y(mean[i]).toFixed(1));
    document.getElementById("n-pct-"+i).textContent=Math.round(mean[i]*100)+"%";
    document.getElementById("n-ti-"+i).textContent=TPS[i]+" \u00b7 "+region+" \u00b7 neutrophil-typed CD44\u207a "+Math.round(mean[i]*100)+"% (mouse-of-mouse mean, n=2)";
    var mm=reg.mice[TPS[i]];
    for(var k=0;k<mm.length;k++){var d=document.getElementById("n-m"+k+"-"+i);if(d){d.setAttribute("cy",y(mm[k][0]).toFixed(1));d.setAttribute("r",rad(mm[k][1]).toFixed(1));}}
  }
  var hn=document.getElementById("n-headnum");if(hn)hn.textContent=Math.round(reg.mean[0]*100)+"% \u2192 "+Math.round(reg.mean[3]*100)+"%";
  var rd=fig.querySelector(".n-readout");if(rd)rd.innerHTML="<b>"+region+"</b> \u00b7 10\u00b5m \u00b7 neutrophil-typed patches (no grid-scale basis \u2014 region lens only)";
}
var raf=null;
function apply(region){fig.setAttribute("data-region",region);var target=F2.regions[region].mean.slice();
  fig.querySelectorAll("[data-set-region]").forEach(function(b){b.setAttribute("aria-checked",b.getAttribute("data-set-region")===region?"true":"false");});
  if(reduce){cur=target;draw(cur,region);return;}
  if(raf)cancelAnimationFrame(raf);var from=cur.slice(),t0=null;
  function step(ts){if(t0===null)t0=ts;var t=Math.min(1,(ts-t0)/460),e=ease(t);
    cur=target.map(function(v,i){return from[i]+(v-from[i])*e;});draw(cur,region);
    if(t<1)raf=requestAnimationFrame(step);else{cur=target.slice();draw(cur,region);raf=null;}}
  raf=requestAnimationFrame(step);}
fig.addEventListener("click",function(e){var t=e.target.closest("[data-set-region]");if(!t)return;apply(t.getAttribute("data-set-region"));});
fig.addEventListener("keydown",function(e){if(/^(INPUT|TEXTAREA)$/.test(e.target.tagName))return;if(e.key==="ArrowLeft"||e.key==="ArrowRight"){var r=["cortex","medulla","pooled"],j=r.indexOf(fig.getAttribute("data-region"));j=(j+(e.key==="ArrowRight"?1:2))%3;apply(r[j]);e.preventDefault();}});
draw(cur,fig.getAttribute("data-region"));
})();
</script>
