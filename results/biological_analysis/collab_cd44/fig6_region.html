    <figcaption>Triple-positive interface fraction across Sham→D1→D3→D7. Switch <em>region</em> (cortex / medulla / pooled) and the trajectory, per-mouse points, Sham-mean baseline, headline and Δ morph in place. Region is a whole-ROI label (each ROI is cortex or medulla), balanced <strong>3 cortex + 3 medulla ROIs at every timepoint</strong>, so the region split does not touch the ternary geometry of Fig 6 — it re-aggregates the same per-ROI triple+ fractions. The line is the mean across the region's 3 ROIs (Pooled reproduces the Fig 6 headline exactly); the two dots are per-mouse means (n=2, no error bars); dot area ∝ √n_support (patches contributing). Cortex rises the more steeply of the two — consistent with the cortex-predominant CD44 activation in §4.6. Descriptive; n=2 mice, paired within-mouse — no region test.
    <span class="source">Source: per-ROI triple+ fractions from Fig 6 (window.FIG6_DATA; results/biological_analysis/cell_type_annotations/, 10µm) joined to region from results/biological_analysis/differential_abundance/roi_abundances.csv. Descriptive; n=2 mice.</span></figcaption>
  </div>

<script>
(function(){
var F6 = {"tps":["Sham","D1","D3","D7"],"regions":{"Cortex":{"mean":[14.261,18.966,28.419,37.593],"mice":{"Sham":[[14.136,4787],[14.511,2412]],"D1":[[17.896,4735],[21.107,2421]],"D3":[[31.842,2437],[26.707,4762]],"D7":[[38.269,4791],[36.239,2478]]},"delta":23.3},"Medulla":{"mean":[14.956,19.668,25.008,27.622],"mice":{"Sham":[[22.664,2440],[11.102,4936]],"D1":[[17.986,2463],[20.508,4841]],"D3":[[20.158,4879],[34.708,2328]],"D7":[[23.932,2457],[29.467,4970]]},"delta":12.7},"Pooled":{"mean":[14.608,19.317,26.713,32.607],"mice":{"Sham":[[16.978,7227],[12.238,7348]],"D1":[[17.926,7198],[20.708,7262]],"D3":[[24.053,7316],[29.374,7090]],"D7":[[33.49,7248],[31.724,7448]]},"delta":18.0}}};
var fig = document.getElementById("fig-6r");
if(!fig) return;
var XT=[248.8,466.2,683.8,901.2], TPS=["Sham","D1","D3","D7"], MICE=["MS1","MS2"];
function y(p){return 440-9*p;}
function rad(n){return Math.max(3,Math.min(7,1.4+1.6*Math.sqrt(n/1000)));}
function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
var cur = F6.regions[fig.getAttribute("data-region")].mean.slice();
function draw(mean,region){var reg=F6.regions[region];
  document.getElementById("t-line").setAttribute("points",mean.map(function(v,i){return XT[i]+","+y(v).toFixed(1);}).join(" "));
  document.getElementById("t-baseline").setAttribute("y1",y(mean[0]).toFixed(1));
  document.getElementById("t-baseline").setAttribute("y2",y(mean[0]).toFixed(1));
  document.getElementById("t-baseline-lab").setAttribute("y",y(mean[0]).toFixed(1));
  for(var i=0;i<4;i++){
    document.getElementById("t-dot-"+i).setAttribute("cy",y(mean[i]).toFixed(1));
    document.getElementById("t-pct-"+i).textContent=mean[i].toFixed(1)+"%";
    document.getElementById("t-ti-"+i).textContent=TPS[i]+" \u00b7 "+region+" \u00b7 triple+ interface "+mean[i].toFixed(1)+"% (mean of 3 ROIs; n=2 mice)";
    var mm=reg.mice[TPS[i]];
    for(var k=0;k<mm.length;k++){var d=document.getElementById("t-mo"+k+"-"+i);if(d){d.setAttribute("cy",y(mm[k][0]).toFixed(1));d.setAttribute("r",rad(mm[k][1]).toFixed(1));}}
  }
  var hn=document.getElementById("t-headnum");if(hn)hn.textContent=reg.mean[0].toFixed(1)+"% \u2192 "+reg.mean[3].toFixed(1)+"%";
  var dl=document.getElementById("t-delta");if(dl)dl.textContent=(reg.delta>=0?"+":"")+reg.delta.toFixed(1)+" pp Sham\u2192D7";
  var npatch=0;for(var t=0;t<4;t++){reg.mice[TPS[t]].forEach(function(mv){npatch+=mv[1];});}
  var rd=fig.querySelector(".t-readout");if(rd)rd.innerHTML="<b>"+region+"</b> \u00b7 10\u00b5m \u00b7 triple+ = a patch above threshold on all three lineages (immune \u2227 fibroblast \u2227 vessel)"+(region!=="Pooled"?" \u00b7 3 ROIs/timepoint":"");
}
var raf=null;
function apply(region){fig.setAttribute("data-region",region);var target=F6.regions[region].mean.slice();
  fig.querySelectorAll("[data-set-region]").forEach(function(b){b.setAttribute("aria-checked",b.getAttribute("data-set-region")===region?"true":"false");});
  if(reduce){cur=target;draw(cur,region);return;}
  if(raf)cancelAnimationFrame(raf);var from=cur.slice(),t0=null;
  function step(ts){if(t0===null)t0=ts;var t=Math.min(1,(ts-t0)/460),e=ease(t);
    cur=target.map(function(v,i){return from[i]+(v-from[i])*e;});draw(cur,region);
    if(t<1)raf=requestAnimationFrame(step);else{cur=target.slice();draw(cur,region);raf=null;}}
  raf=requestAnimationFrame(step);}
fig.addEventListener("click",function(e){var b=e.target.closest("[data-set-region]");if(!b)return;apply(b.getAttribute("data-set-region"));});
fig.addEventListener("keydown",function(e){if(/^(INPUT|TEXTAREA)$/.test(e.target.tagName))return;if(e.key==="ArrowLeft"||e.key==="ArrowRight"){var r=["Cortex","Medulla","Pooled"],j=r.indexOf(fig.getAttribute("data-region"));j=(j+(e.key==="ArrowRight"?1:2))%3;apply(r[j]);e.preventDefault();}});
draw(cur,fig.getAttribute("data-region"));
})();
</script>
