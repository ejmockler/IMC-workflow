name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
        uv pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        PYTHONPATH=. uv run python -m pytest tests/ \
          -o addopts='' \
          -m "not integration and not slow and not performance and not benchmark" \
          --strict-markers \
          --tb=short \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=40
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
        uv pip install pytest pytest-cov
    
    - name: Run integration tests
      run: |
        PYTHONPATH=. uv run python -m pytest tests/ \
          -o addopts='' \
          -m "integration" \
          --strict-markers \
          --tb=short \
          --cov=src \
          --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        flags: integration
        fail_ci_if_error: true

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
        uv pip install pytest pytest-cov
    
    - name: Run all tests with coverage
      run: |
        PYTHONPATH=. uv run python -m pytest tests/ \
          -o addopts='' \
          -m "not slow and not performance and not benchmark" \
          --strict-markers \
          --tb=short \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-report=html \
          --cov-fail-under=40
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: htmlcov/
