name: Nightly Tests

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
        uv pip install pytest pytest-benchmark memory-profiler
    
    - name: Run performance tests
      run: |
        PYTHONPATH=. uv run python -m pytest \
          tests/test_performance_core.py \
          tests/test_performance_regression.py \
          -o addopts='' \
          --strict-markers \
          --tb=short \
          --durations=20

  security-tests:
    name: Security Scans
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
        uv pip install pytest bandit safety
    
    - name: Generate bandit security report (informational)
      continue-on-error: true
      run: |
        uv run bandit -r src/ -f json -o bandit-report.json
    
    - name: Check for known vulnerabilities (informational)
      continue-on-error: true
      run: |
        uv run safety check --json > safety-report.json
    
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  full-regression:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
        uv pip install pytest pytest-cov pytest-xdist
    
    - name: Run full test suite in parallel
      run: |
        PYTHONPATH=. uv run python -m pytest tests/ \
          -o addopts='' \
          -n auto \
          --strict-markers \
          --tb=short \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=40
    
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        flags: nightly
        fail_ci_if_error: false
